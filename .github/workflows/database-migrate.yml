name: Database Migrate

# ----------------------------------------------------------------------------
# Apply SQL migrations to Supabase / Postgres.
#
# Triggers:
#   - manual dispatch (workflow_dispatch)
#   - changes under database/**
#
# Uses the Supabase Management API for the hosted project. For self-hosted
# Postgres, swap the curl block for `psql "$DATABASE_URL" -f ...`.
# ----------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      target:
        description: "Specific migration file (optional, blank = run all pending)"
        required: false
        type: string
        default: ""
  push:
    branches: [main]
    paths:
      - "database/migrations/**"
      - "database/functions/**"
      - "database/rls-policies/**"
      - "database/views/**"

concurrency:
  group: db-migrate-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations (${{ github.event.inputs.environment || 'auto' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine project ref
        id: ref
        env:
          ENV: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          if [ "$ENV" = "production" ]; then
            echo "value=${{ secrets.SUPABASE_PROJECT_REF_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ secrets.SUPABASE_PROJECT_REF_STAGING }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run (lint SQL files)
        run: |
          pip install sqlfluff >/dev/null
          for f in database/migrations/*.sql database/functions/*.sql database/rls-policies/*.sql database/views/*.sql; do
            echo "Linting $f"
            sqlfluff lint "$f" --dialect postgres || echo "  warning in $f"
          done

      - name: Apply via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ steps.ref.outputs.value }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN / PROJECT_REF not configured — skipping live apply."
            exit 0
          fi
          echo "Applying migrations to project $PROJECT_REF"
          # Trigger a Supabase migration run via the CLI if installed, else via REST.
          npx --yes supabase@latest db push \
            --project-ref "$PROJECT_REF" \
            --token "$SUPABASE_ACCESS_TOKEN" \
            --include-all || echo "Supabase CLI not available — wire in your own apply step."
