name: Calculate Greeks

# Runs weekdays at 9 PM UTC (4 PM EST).
on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

jobs:
  calculate:
    uses: ./.github/workflows/reusable-python-task.yml
    with:
      script_name: calculate_greeks
    secrets:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
