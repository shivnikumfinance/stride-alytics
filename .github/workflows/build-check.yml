name: Build Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        # Vite 8 requires Node ^20.19.0 || >=22.12.0 — Node 18 fails the
        # build. Pin to the latest 22 LTS line so we don't have to
        # revisit this every Node release.
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm install
        working-directory: ./frontend
      
      - name: Check TypeScript types
        run: npm run type-check
        working-directory: ./frontend
      
      - name: Run ESLint
        run: npm run lint
        working-directory: ./frontend
      
      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  backend-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        # Use the official uv action rather than piping curl — matches
        # backend-ci-cd.yml and adds caching automatically.
        uses: astral-sh/setup-uv@v3
      
      - name: Install dependencies
        run: |
          cd backend
          uv sync
      
      - name: Run ruff linting
        run: |
          cd backend
          uv run ruff check .
      
      - name: Check black formatting
        run: |
          cd backend
          uv run black --check .
      
      - name: Run mypy type checking
        run: |
          cd backend
          uv run mypy app --no-error-summary
        continue-on-error: true
      
      - name: Run pytest tests
        run: |
          cd backend
          uv run pytest tests -v
