services:
  - type: web
    name: stridealytics-api
    rootDirectory: backend
    env: python
    # Use a fully-qualified patch version so Render installs the exact
    # interpreter into the build sandbox. Bare "3.12" is unreliable
    # when the build is delegated to uv (uv 0.10.2 + Render's
    # `python-downloads=never` default will refuse to auto-fetch).
    # `.python-version` is the secondary pin; either one works.
    pythonVersion: "3.12.13"
    buildCommand: "uv sync --frozen --no-dev --active"
    startCommand: "uv run --active uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    numInstances: 1
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://stridealytics.com,https://www.stridealytics.com
      - key: APP_NAME
        value: StrideAlytics
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: "production"
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SLACK_WEBHOOK
        sync: false